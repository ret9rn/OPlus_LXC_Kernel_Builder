name: Build OnePlus 13 Kernel with LXC

on:
  workflow_dispatch: # 允许在 Actions 页面手动点击触发

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Maximize Build Space
      # 极其重要：清理 GitHub Runner 自带的无用环境，腾出约 40GB+ 空间
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 8192
        swap-size-mb: 8192
        remove-dotnet: 'true'
        remove-android: 'true' # 虽然是安卓内核，但不需要上层的应用SDK
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential bc python3 python3-pip curl wget git zip unzip ccache libncurses-dev bison flex libssl-dev libelf-dev rsync
        # 安装 repo 工具
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Initialize and Sync Kernel Source
      run: |
        mkdir -p workspace/kernel_workspace
        cd workspace/kernel_workspace
        
        # 配置 Git 身份
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        
        # 拉取 OnePlus 13 源码 (请根据官方最新 release 调整 branch 和 manifest)
        repo init -u https://github.com/OnePlusOSS/kernel_manifest.git -b oneplus/sm8750 -m oneplus_13_b.xml --depth=1
        
        # 同步源码，使用浅克隆节省空间和时间
        repo sync -c -j$(nproc) --no-clone-bundle --no-tags

    - name: Inject LXC Configurations (Patch Defconfig)
      run: |
        cd workspace/kernel_workspace
        
        # 定义需要开启的 LXC 相关 Config 列表
        LXC_CONFIGS="CONFIG_NAMESPACES=y
        CONFIG_UTS_NS=y
        CONFIG_IPC_NS=y
        CONFIG_USER_NS=y
        CONFIG_PID_NS=y
        CONFIG_NET_NS=y
        CONFIG_CGROUPS=y
        CONFIG_CGROUP_DEVICE=y
        CONFIG_CGROUP_SCHED=y
        CONFIG_CGROUP_CPUACCT=y
        CONFIG_CGROUP_FREEZER=y
        CONFIG_CGROUP_BPF=y
        CONFIG_MEMCG=y
        CONFIG_MEMCG_SWAP=y
        CONFIG_VETH=y
        CONFIG_BRIDGE=y
        CONFIG_NETFILTER_XT_MATCH_COMMENT=y
        CONFIG_POSIX_MQUEUE=y"
        
        # 针对 OPlus 的配置结构，通常需要追加到 GKI config 或 vendor config 中
        # 这里以 vendor 的 defconfig 为例，实际路径可能因 OnePlusOSS 的树结构略有不同，常见路径如下：
        CONFIG_FILE="kernel_platform/msm-kernel/arch/arm64/configs/vendor/sun_defconfig"
        
        if [ -f "$CONFIG_FILE" ]; then
          echo "Found defconfig at $CONFIG_FILE, injecting LXC configs..."
          echo "$LXC_CONFIGS" >> "$CONFIG_FILE"
        else
          echo "Warning: sun_defconfig not found. Searching for alternative configs..."
          # 备选路径：如果是标准的 GKI 结构
          find kernel_platform -name "gki_defconfig" -exec sh -c 'echo "$LXC_CONFIGS" >> "{}"' \;
        fi

    - name: Build Kernel (Kleaf / Bazel)
      run: |
        cd workspace/kernel_workspace/kernel_platform
        
        # OnePlus 13 (SM8750/sun) 的官方构建命令
        # LTO=thin 可以显著减少编译时间和内存消耗
        LTO=thin REPACK_IMG=true ./build/kernel/build.sh -c sun

    - name: Prepare Artifacts
      run: |
        cd workspace/kernel_workspace
        mkdir -p kernel_output
        
        # 寻找编译好的 Image 文件 (由于 Bazel 结构复杂，使用 find 寻找最终产物)
        find kernel_platform/out -name "Image" -exec cp {} kernel_output/ \;
        find kernel_platform/out -name "*.ko" -exec cp {} kernel_output/ \;

    - name: Upload Kernel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OnePlus13-LXC-Kernel
        path: workspace/kernel_workspace/kernel_output/
    - name: Package with AnyKernel3
      run: |
        cd workspace/kernel_workspace
        
        # 1. 克隆 AnyKernel3 仓库
        git clone https://github.com/osm0sis/AnyKernel3.git -b master AnyKernel3
        
        # 2. 清理 AK3 目录中不需要的文件
        rm -rf AnyKernel3/.git* AnyKernel3/README.md
        
        # 3. 将编译出的 Image 复制到 AnyKernel3 根目录
        echo "Searching and copying Image file..."
        find kernel_platform/out -name "Image" -exec cp {} AnyKernel3/ \;
        
        # 4. 修改 anykernel.sh 配置文件以适配 OnePlus 13 (代号 dodge / sun)
        sed -i 's/kernel.string=.*/kernel.string=OnePlus 13 LXC Kernel by GitHub Actions/' AnyKernel3/anykernel.sh
        sed -i 's/device.name1=.*/device.name1=dodge/' AnyKernel3/anykernel.sh
        sed -i 's/device.name2=.*/device.name2=sun/' AnyKernel3/anykernel.sh
        sed -i 's/device.name3=.*/device.name3=OnePlus13/' AnyKernel3/anykernel.sh
        sed -i 's/device.name4=.*/device.name4=OP13/' AnyKernel3/anykernel.sh
        
        # 针对 GKI 设备，通常不需要修改 boot 分区里的 ramdisk，设置 do.devicecheck=0 可以避免机型识别错误导致刷入失败
        sed -i 's/do.devicecheck=.*/do.devicecheck=0/' AnyKernel3/anykernel.sh
        sed -i 's/do.modules=.*/do.modules=0/' AnyKernel3/anykernel.sh
        
        # 5. 打包成可刷入的 zip
        cd AnyKernel3
        zip -r9 ../OnePlus13-LXC-Kernel-Flashable.zip *
        cd ..

    - name: Upload Flashable ZIP
      uses: actions/upload-artifact@v4
      with:
        name: OnePlus13-LXC-Kernel-ZIP
        # 只上传打包好的 zip 文件
        path: workspace/kernel_workspace/OnePlus13-LXC-Kernel-Flashable.zip
