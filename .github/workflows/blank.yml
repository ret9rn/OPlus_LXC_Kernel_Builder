name: OnePlus 13 A16 LXC Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest # 使用最新镜像
    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc python3 python3-pip curl wget git zip unzip ccache libncurses-dev bison flex libssl-dev libelf-dev rsync
          sudo ln -sf /usr/bin/python3 /usr/bin/python
          # 安装 repo
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Sync Source
        run: |
          mkdir workspace && cd workspace
          git config --global user.name "Bot"
          git config --global user.email "bot@example.com"
          # 使用你之前提到的 13_b 清单
          repo init -u https://github.com/OnePlusOSS/kernel_manifest.git -b oneplus/sm8750 -m oneplus_13_b.xml --depth=1
          repo sync -c -j$(nproc) --no-clone-bundle --no-tags
          
          # 核心修正：建立 Oplus 习惯的软链接
          cd kernel_platform
          [ -d "oplus/build" ] && ln -sf oplus/build build
          
          # 释放空间
          cd ..
          rm -rf .repo

      - name: Patch LXC Config
        run: |
          cd workspace/kernel_platform/msm-kernel
          
          # 自动定位 Android 16 的 GKI 配置文件
          # 在 SM8750 分支，通常是 sun_gki_defconfig
          CONF=$(find arch/arm64/configs/vendor -name "sun_gki_defconfig" | head -n 1)
          
          echo "Selected Config: $CONF"
          
          # 追加 LXC 必须参数
          cat <<EOF >> "$CONF"
          CONFIG_NAMESPACES=y
          CONFIG_USER_NS=y
          CONFIG_PID_NS=y
          CONFIG_NET_NS=y
          CONFIG_CGROUPS=y
          CONFIG_CGROUP_FREEZER=y
          CONFIG_CGROUP_DEVICE=y
          CONFIG_CPUSETS=y
          CONFIG_CGROUP_CPUACCT=y
          CONFIG_MEMCG=y
          CONFIG_VETH=y
          CONFIG_BRIDGE=y
          CONFIG_NETFILTER_XT_MATCH_COMMENT=y
          CONFIG_POSIX_MQUEUE=y
          CONFIG_IKCONFIG=y
          CONFIG_IKCONFIG_PROC=y
          EOF

      - name: Build Kernel (Bazel/Kleaf)
        run: |
          cd workspace/kernel_platform
          
          # 绕过 A16 的 ABI 限制
          export SKIP_ABI_WHITELIST=1
          export KLEAF_BYPASS_ABI_CHECK=1
          
          # 使用该仓库推荐的构建入口（如果有 oplus/build/build.sh）
          if [ -f "oplus/build/build.sh" ]; then
            echo "Using Oplus Build Wrapper..."
            ./oplus/build/build.sh sun gki --dist_dir=../out
          else
            echo "Using Direct Bazel..."
            ./tools/bazel run //msm-kernel:sun_dist -- --dist_dir=../out --config=fast
          fi

      - name: Package with AnyKernel3
        run: |
          cd workspace
          git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          # 复制 Image 和模块
          find out -name "Image" -exec cp {} AnyKernel3/ \;
          find out -name "*.ko" -exec cp {} AnyKernel3/modules/ \;
          
          cd AnyKernel3
          # 修改脚本适配 OnePlus 13
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          zip -r9 ../OnePlus13-LXC-Kernel.zip *

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OP13-LXC-Kernel
          path: workspace/OnePlus13-LXC-Kernel.zip
