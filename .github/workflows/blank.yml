name: Build OnePlus 13 Android 16 Kernel (LXC)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc python3 python3-pip curl wget git zip unzip ccache libncurses-dev bison flex libssl-dev libelf-dev rsync
          sudo ln -sf /usr/bin/python3 /usr/bin/python
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Sync Source
        run: |
          mkdir workspace && cd workspace
          git config --global user.name "Bot"
          git config --global user.email "bot@example.com"
          # 使用你提供的准确分支和清单文件
          repo init -u https://github.com/OnePlusOSS/kernel_manifest.git -b oneplus/sm8750 -m oneplus_13_b.xml --depth=1
          repo sync -c -j$(nproc) --no-clone-bundle --no-tags

      - name: Enable LXC Configs
        run: |
          # 核心修正：从工作区根目录开始搜索，排除编译过程生成的干扰文件
          cd workspace/kernel_platform
          
          echo "Searching for defconfig files in kernel_platform..."
          # 这里的搜索路径针对 SM8750 进行了优化
          # 它会寻找 vendor 下的 sun 平台相关配置，通常是 sun_gki_defconfig 或 oplus_sun_gki_defconfig
          CONF=$(find msm-kernel/arch/arm64/configs -name "*sun*_defconfig" | grep "gki" | head -n 1)
          
          if [ -z "$CONF" ]; then
            echo "Failed to find sun-specific gki_defconfig, trying generic GKI..."
            CONF=$(find msm-kernel/arch/arm64/configs -name "gki_defconfig" | head -n 1)
          fi

          if [ -z "$CONF" ]; then
            echo "ERROR: Could not find any suitable defconfig!"
            # 这里的调试信息能帮你看到真实的路径
            find msm-kernel/arch/arm64/configs -maxdepth 3
            exit 1
          fi

          echo "Found defconfig at: $CONF"
          echo "Injecting LXC configs..."
          
          # 追加 LXC 必要的内核开关
          cat <<EOF >> "$CONF"
          CONFIG_NAMESPACES=y
          CONFIG_USER_NS=y
          CONFIG_PID_NS=y
          CONFIG_NET_NS=y
          CONFIG_CGROUPS=y
          CONFIG_CGROUP_FREEZER=y
          CONFIG_CGROUP_DEVICE=y
          CONFIG_CPUSETS=y
          CONFIG_CGROUP_CPUACCT=y
          CONFIG_MEMCG=y
          CONFIG_VETH=y
          CONFIG_BRIDGE=y
          CONFIG_NETFILTER_XT_MATCH_COMMENT=y
          CONFIG_POSIX_MQUEUE=y
          CONFIG_IKCONFIG=y
          CONFIG_IKCONFIG_PROC=y
          EOF

      - name: Build Kernel (Kleaf)
        run: |
          cd workspace/kernel_platform
          
          # 针对 Android 16 的 Bazel 环境配置
          chmod +x tools/bazel
          export SKIP_ABI_WHITELIST=1
          export KLEAF_BYPASS_ABI_CHECK=1
          
          # SM8750 的构建目标通常是 sun_gki 
          # 使用 oneplus_13_b 对应的 dist 目标，如果报错，请尝试 //msm-kernel:sun_dist
          ./tools/bazel run //msm-kernel:sun_gki_dist -- --dist_dir=../out --config=fast
          
      - name: Package AnyKernel3
        run: |
          cd workspace
          git clone https://github.com/osm0sis/AnyKernel3.git
          rm -rf AnyKernel3/.git*
          
          # 拷贝内核镜像
          find out -name "Image" -exec cp {} AnyKernel3/ \;
          
          # 拷贝 LXC 需要的内核模块 (veth.ko 等)
          mkdir -p AnyKernel3/modules
          find out -name "*.ko" -exec cp {} AnyKernel3/modules/ \;
          
          # 配置 AnyKernel3 脚本
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
          sed -i 's/device.name1=.*/device.name1=dodge/g' AnyKernel3/anykernel.sh
          
          cd AnyKernel3
          zip -r9 ../OP13-A16-LXC-Kernel.zip *

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OP13-A16-Kernel
          path: workspace/OP13-A16-LXC-Kernel.zip
