name: Build OnePlus 13 Android 16 Kernel (LXC)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc python3 python3-pip curl wget git zip unzip ccache libncurses-dev bison flex libssl-dev libelf-dev rsync
          sudo ln -sf /usr/bin/python3 /usr/bin/python
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Sync Source
        run: |
          mkdir workspace && cd workspace
          git config --global user.name "Bot"
          git config --global user.email "bot@example.com"
          # 注意：这里的 manifest 链接请确保指向 Android 16 对应的分支
          repo init -u https://github.com/OnePlusOSS/kernel_manifest.git -b oneplus/sm8750_v -m oneplus_13_v.xml --depth=1
          repo sync -c -j$(nproc) --no-clone-bundle --no-tags

      - name: Enable LXC Configs
        run: |
          cd workspace/kernel_platform/msm-kernel
          # 针对 Android 16 的 GKI 基础配置注入
          # 优先尝试在 vendor 的 sun_v_gki_defconfig 中修改
          CONF="arch/arm64/configs/vendor/sun_v_gki_defconfig"
          [ ! -f "$CONF" ] && CONF=$(find arch/arm64/configs/vendor/ -name "*gki_defconfig" | head -n 1)
          
          echo "Injecting LXC configs into $CONF"
          cat <<EOF >> "$CONF"
          CONFIG_NAMESPACES=y
          CONFIG_USER_NS=y
          CONFIG_PID_NS=y
          CONFIG_NET_NS=y
          CONFIG_CGROUPS=y
          CONFIG_CGROUP_FREEZER=y
          CONFIG_CGROUP_DEVICE=y
          CONFIG_CPUSETS=y
          CONFIG_CGROUP_CPUACCT=y
          CONFIG_MEMCG=y
          CONFIG_VETH=y
          CONFIG_BRIDGE=y
          CONFIG_NETFILTER_XT_MATCH_COMMENT=y
          EOF

      - name: Build Kernel (Kleaf)
        run: |
          cd workspace/kernel_platform
          # Android 16 强制开启 ABI 检查，自定义内核必须通过环境变量跳过
          # --config=fast 禁用不必要的 DWARF 调试信息生成，节省磁盘和时间
          export SKIP_ABI_WHITELIST=1
          export KLEAF_BYPASS_ABI_CHECK=1
          
          # 执行构建：针对 sun 平台的 GKI 分发目标
          ./tools/bazel run //msm-kernel:sun_v_gki_dist -- --dist_dir=../out --config=fast

      - name: Package AnyKernel3
        run: |
          cd workspace
          git clone https://github.com/osm0sis/AnyKernel3.git
          rm -rf AnyKernel3/.git*
          
          # 拷贝内核镜像
          find out -name "Image" -exec cp {} AnyKernel3/ \;
          
          # 拷贝 LXC 需要的内核模块 (veth.ko 等)
          mkdir -p AnyKernel3/modules
          find out -name "*.ko" -exec cp {} AnyKernel3/modules/ \;
          
          # 配置 AnyKernel3 脚本
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
          sed -i 's/device.name1=.*/device.name1=dodge/g' AnyKernel3/anykernel.sh
          
          cd AnyKernel3
          zip -r9 ../OP13-A16-LXC-Kernel.zip *

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OP13-A16-Kernel
          path: workspace/OP13-A16-LXC-Kernel.zip
