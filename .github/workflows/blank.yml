name: Build OnePlus 13 Android 16 Kernel (LXC)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc python3 python3-pip curl wget git zip unzip ccache libncurses-dev bison flex libssl-dev libelf-dev rsync
          sudo ln -sf /usr/bin/python3 /usr/bin/python
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Sync Source
        run: |
          mkdir -p workspace && cd workspace
          git config --global user.name "Bot"
          git config --global user.email "bot@example.com"
          
          # 1. 初始化并同步 (加上 --no-tags 和 --no-clone-bundle 提速)
          repo init -u https://github.com/OnePlusOSS/kernel_manifest.git -b oneplus/sm8750 -m oneplus_13_b.xml --depth=1
          repo sync -c -j$(nproc) --no-clone-bundle --no-tags
          
          # 2. 【核心修复】修正 Bazel 预期的构建路径
          cd kernel_platform
          
          # 检查 build 目录是否存在，如果不存在则查找并建立软链接
          if [ ! -d "build" ]; then
            echo "Build directory not found at root, searching for oplus/build..."
            if [ -d "oplus/build" ]; then
              ln -s oplus/build build
              echo "Linked oplus/build to build"
            elif [ -d "common/build" ]; then
              ln -s common/build build
              echo "Linked common/build to build"
            fi
          fi

          # 3. 【节省空间】源码同步完后立即删除巨大的 .repo 目录 (节省约 20-30GB)
          cd ..
          rm -rf .repo
          echo "Deleted .repo to save space"

      - name: Enable LXC Configs
        run: |
          cd workspace/kernel_platform
          # 针对 SM8750 重新定位正确的 defconfig
          # 通常路径为：msm-kernel/arch/arm64/configs/vendor/sun_gki_defconfig
          CONF=$(find msm-kernel/arch/arm64/configs -name "sun_gki_defconfig" | head -n 1)
          [ -z "$CONF" ] && CONF=$(find msm-kernel/arch/arm64/configs -name "*gki_defconfig" | head -n 1)
          
          echo "Injecting to $CONF"
          cat <<EOF >> "$CONF"
          CONFIG_NAMESPACES=y
          CONFIG_USER_NS=y
          CONFIG_PID_NS=y
          CONFIG_NET_NS=y
          CONFIG_CGROUPS=y
          CONFIG_CGROUP_FREEZER=y
          CONFIG_CGROUP_DEVICE=y
          CONFIG_CPUSETS=y
          CONFIG_CGROUP_CPUACCT=y
          CONFIG_MEMCG=y
          CONFIG_VETH=y
          CONFIG_BRIDGE=y
          CONFIG_NETFILTER_XT_MATCH_COMMENT=y
          CONFIG_POSIX_MQUEUE=y
          CONFIG_IKCONFIG=y
          CONFIG_IKCONFIG_PROC=y
          EOF

      - name: Build Kernel (Kleaf)
        run: |
          cd workspace/kernel_platform
          chmod +x tools/bazel
          
          export SKIP_ABI_WHITELIST=1
          export KLEAF_BYPASS_ABI_CHECK=1
          
          # 对于 oneplus_13_b，目标名可能是 //msm-kernel:sun_gki 或 //msm-kernel:sun_dist
          # 如果不确定，可以先用 query 查一下。这里尝试最通用的 sun_dist
          ./tools/bazel run //msm-kernel:sun_dist -- --dist_dir=../out --config=fast
          
      - name: Package AnyKernel3
        run: |
          cd workspace
          git clone https://github.com/osm0sis/AnyKernel3.git
          rm -rf AnyKernel3/.git*
          
          # 拷贝内核镜像
          find out -name "Image" -exec cp {} AnyKernel3/ \;
          
          # 拷贝 LXC 需要的内核模块 (veth.ko 等)
          mkdir -p AnyKernel3/modules
          find out -name "*.ko" -exec cp {} AnyKernel3/modules/ \;
          
          # 配置 AnyKernel3 脚本
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
          sed -i 's/device.name1=.*/device.name1=dodge/g' AnyKernel3/anykernel.sh
          
          cd AnyKernel3
          zip -r9 ../OP13-A16-LXC-Kernel.zip *

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OP13-A16-Kernel
          path: workspace/OP13-A16-LXC-Kernel.zip
